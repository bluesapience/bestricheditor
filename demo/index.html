<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best Rich Editor</title>
    <link rel="stylesheet" href="/dist/bre.css" />
    <link rel="stylesheet" href="/demo/demo.css" />
  </head>
  <body>
    <header class="demo-header">
      <span class="demo-header__logo">▦|</span>
      <span class="demo-header__title">Best Rich Editor</span>
    </header>

    <style>
      .demo-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid #e5e7eb;
        padding: 0 24px;
        background: #f9fafb;
      }
      .demo-tab {
        padding: 10px 20px;
        border: none;
        background: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        color: #6b7280;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        font-family: inherit;
        transition: color 0.15s ease;
      }
      .demo-tab--active {
        color: #111827;
        border-bottom-color: #3b82f6;
      }
      .demo-tab:hover:not(.demo-tab--active) {
        color: #374151;
      }
    </style>

    <main class="demo-main">
      <div class="demo-card">
        <div class="demo-tabs">
          <button class="demo-tab demo-tab--active" data-mode="BRE">BRE</button>
          <button class="demo-tab" data-mode="BREM">BREM</button>
          <button class="demo-tab" data-mode="BREW">BREW</button>
        </div>
        <div id="bre-demo"></div>
      </div>
    </main>

    <script type="module" src="/demo/demo.js"></script>
  </body>
</html>
